name: Run setup-nix
description: Set up Nix environment for GitHub Actions
inputs:
  cachix-auth-token:
    required: true
runs:
  using: composite
  steps:
    - name: Install Nix
      uses: cachix/install-nix-action@616559265b40713947b9c190a8ff4b507b5df49b # v31.10.4
    - name: Setup Cachix
      uses: cachix/cachix-action@1eb2ef646ac0255473d23a5907ad7b04ce94065c # v17
      with:
        name: ningit-nix-configuration
        authToken: "${{ inputs.cachix-auth-token }}"
